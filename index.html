<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> PROx45 </title>

<style>
body{margin:0;font-family:Arial;background:#f5f7ff;}
header{background:#2563eb;color:#fff;padding:14px;font-weight:bold;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px;}
input{width:100%;padding:10px;margin:6px 0;}
button{padding:10px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;}
.row{display:flex;gap:10px}
.tableRow{display:grid;grid-template-columns:1fr 1fr 40px;gap:10px;margin-top:8px;}
.hidden{display:none}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<header>📦 PRO45</header>

<div class="container">

<div class="card" id="home">
<h3>👑 Crear formulario</h3>
<input id="name" placeholder="Nombre"/>
<button onclick="create()">Crear</button>
<div id="list"></div>
</div>

<div class="card hidden" id="sheet">
<div class="row">
<button onclick="back()">⬅</button>
<button onclick="save()">💾 Guardar</button>
<button onclick="share()">📤</button>
</div>

<h3 id="title"></h3>
<div id="items"></div>
<button onclick="add()">➕ Agregar</button>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD0HNFfvNqjYMspNtNFgRxy2segtsRspGo",
authDomain:"t3-2-1a478.firebaseapp.com",
databaseURL:"https://t3-2-1a478-default-rtdb.firebaseio.com",
projectId:"t3-2-1a478"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let idActual=null;
let dataActual={items:[]};
let hold;

function create(){
const name=document.getElementById("name").value;
if(!name) return;

const id=db.ref("forms").push().key;

db.ref("forms/"+id).set({
name,
items:[]
});

open(id);
load();
}

function open(id){
idActual=id;

db.ref("forms/"+id).once("value",s=>{
dataActual=s.val() || {items:[]};

if(!dataActual.items) dataActual.items=[];

document.getElementById("home").classList.add("hidden");
document.getElementById("sheet").classList.remove("hidden");
document.getElementById("title").innerText=dataActual.name;

render();
});
}

function render(){
const box=document.getElementById("items");
box.innerHTML="";

dataActual.items.forEach((i,idx)=>{
box.innerHTML+=`
<div class="tableRow">
<input value="${i.n||""}" oninput="edit(${idx},'n',this.value)">
<input value="${i.q||""}" oninput="edit(${idx},'q',this.value)">
<button onmousedown="holdDel(${idx})" onmouseup="clearHold()">🗑</button>
</div>`;
});
}

function add(){
dataActual.items.push({n:"",q:""});
render();
}

function edit(i,k,v){
dataActual.items[i][k]=v;
}

function save(){
db.ref("forms/"+idActual).update(dataActual);
alert("Guardado ✔");
}

function holdDel(i){
hold=setTimeout(()=>{
dataActual.items.splice(i,1);
render();
},600);
}

function clearHold(){clearTimeout(hold);}

function share(){
db.ref("forms/"+idActual).once("value",s=>{
const d=s.val();
const link=location.origin+"/f/"+d.name;
window.open("https://wa.me/?text="+encodeURIComponent(link));
});
}

function back(){
location.reload();
}

function load(){
db.ref("forms").on("value",s=>{
const d=s.val()||{};
const box=document.getElementById("list");
box.innerHTML="";

Object.entries(d).forEach(([id,f])=>{
box.innerHTML+=`<div>${f.name} <button onclick="open('${id}')">Abrir</button></div>`;
});
});
}

load();
</script>

</body>
</html>
